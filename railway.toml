# Fallback when Railway service "api" uses Root Directory = repo root (.)
# Recommended: set api Root Directory to "server" and use server/railway.toml instead.

[build]
builder = "NIXPACKS"
buildCommand = "cd server && (npm ci --omit=dev || npm install --omit=dev) && test -f src/db/init.js"

[deploy]
startCommand = "cd server && node src/server.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 120
restartPolicyType = "on_failure"
